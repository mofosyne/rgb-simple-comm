<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Human-Readable — Decoder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111; color: #ddd; font-family: monospace;
      height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
    }
    nav {
      padding: 9px 14px; background: #181818; border-bottom: 1px solid #252525;
      font-size: 13px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    nav a { color: #6a6; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    nav span { color: #777; }
    #camera-wrap { position: relative; flex: 1; overflow: hidden; background: #000; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #reticle {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 72px; height: 72px;
      border: 2px solid rgba(255,255,255,0.5); border-radius: 50%;
      pointer-events: none;
    }
    #reticle::before, #reticle::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.4);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
    }
    #reticle::before { width: 1px; height: 24px; }
    #reticle::after  { width: 24px; height: 1px; }
    #sample-dot {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 18px; height: 18px; border-radius: 50%;
      background: #333; border: 1px solid rgba(255,255,255,0.2);
      pointer-events: none; transition: background 0.05s;
    }
    #panel { padding: 12px 14px 18px; background: #1a1a1a; border-top: 1px solid #252525; flex-shrink: 0; }
    #colour-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #777; margin-bottom: 8px; }
    #colour-swatch { width: 14px; height: 14px; border-radius: 2px; background: #333; border: 1px solid #444; flex-shrink: 0; }
    #output-box {
      background: #111; border: 1px solid #252525; border-radius: 3px;
      padding: 8px 10px; min-height: 44px; font-size: 20px;
      letter-spacing: 1px; color: #3f3; word-break: break-all; margin-bottom: 10px;
    }
    #output-box:empty::before { content: 'Waiting for signal…'; color: #3a3a3a; font-size: 13px; }
    #controls { display: flex; gap: 8px; }
    button {
      flex: 1; background: #222; color: #ccc; border: 1px solid #333;
      padding: 8px 0; font-family: monospace; font-size: 13px;
      border-radius: 3px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    button:active { background: #3a3a3a; }
    #start-btn { background: #182818; border-color: #2a5a2a; color: #6c6; }
    canvas { display: none; }
  </style>
</head>
<body>

<nav>
  <a href="../index.html">← index</a>
  <span>/</span>
  <span>Human-Readable — Decoder</span>
</nav>

<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="reticle"><div id="sample-dot"></div></div>
</div>

<div id="panel">
  <div id="colour-row">
    <div id="colour-swatch"></div>
    <span>Detected: <span id="colour-name">—</span></span>
  </div>
  <div id="output-box"></div>
  <div id="controls">
    <button id="start-btn" onclick="startCamera()">Start Camera</button>
    <button onclick="clearOutput()">Clear</button>
  </div>
</div>

<script>
  const C = { DARK:0, BLUE:1, GREEN:2, CYAN:3, RED:4, MAGENTA:5, YELLOW:6, WHITE:7 };
  const NAME = ['Dark','Blue','Green','Cyan','Red','Magenta','Yellow','White'];
  const CSS  = ['#1a1a1a','#2244ff','#00cc44','#00aacc','#dd2222','#cc22bb','#ccaa00','#dddddd'];

  // Blue=00, Magenta=01, Yellow=10, White=11 | Green=mark(p=0), Red=mark(p=1)
  const DATA_BITS = { [C.BLUE]:0, [C.MAGENTA]:1, [C.YELLOW]:2, [C.WHITE]:3 };

  let bits_received = 0, current_byte = 0;
  let stable = C.DARK, stable_n = 0, last_emitted = C.DARK;
  const DEBOUNCE = 3;

  function classify(r, g, b) {
    const max = Math.max(r, g, b);
    if (max < 45) return C.DARK;
    const t = max * 0.42;
    return ((r > t ? 1 : 0) << 2) | ((g > t ? 1 : 0) << 1) | (b > t ? 1 : 0);
  }

  function decode(colour) {
    if (colour === C.DARK) return;
    if (colour === C.GREEN || colour === C.RED) {
      if (bits_received === 4)
        document.getElementById('output-box').textContent += String.fromCharCode(current_byte & 0xFF);
      bits_received = 0; current_byte = 0; return;
    }
    const bits = DATA_BITS[colour];
    if (bits !== undefined && bits_received < 4) {
      current_byte = (current_byte << 2) | bits;
      bits_received++;
    }
  }

  function feed(colour) {
    if (colour === stable) { stable_n++; } else { stable = colour; stable_n = 1; }
    if (stable_n >= DEBOUNCE && colour !== last_emitted) { last_emitted = colour; decode(colour); }
    document.getElementById('colour-name').textContent = NAME[colour];
    document.getElementById('colour-swatch').style.background = CSS[colour];
    document.getElementById('sample-dot').style.background = CSS[colour];
  }

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const SZ = 40;

  function tick() {
    if (!video.srcObject) return;
    requestAnimationFrame(tick);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const px = ctx.getImageData(Math.floor((canvas.width - SZ) / 2), Math.floor((canvas.height - SZ) / 2), SZ, SZ).data;
    let r = 0, g = 0, b = 0;
    for (let i = 0; i < px.length; i += 4) { r += px[i]; g += px[i+1]; b += px[i+2]; }
    const n = SZ * SZ;
    feed(classify(r / n, g / n, b / n));
  }

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
      video.srcObject = stream;
      await video.play();
      canvas.width = video.videoWidth || 1280;
      canvas.height = video.videoHeight || 720;
      video.addEventListener('resize', () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; });
      requestAnimationFrame(tick);
      const btn = document.getElementById('start-btn');
      btn.textContent = 'Camera On'; btn.disabled = true;
    } catch (e) { alert('Camera error: ' + e.message); }
  }

  function clearOutput() {
    document.getElementById('output-box').textContent = '';
    bits_received = 0; current_byte = 0; last_emitted = C.DARK;
  }
</script>
</body>
</html>
